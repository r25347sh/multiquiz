<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiQuiz</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .matching-container {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            margin: 25px 0;
            position: relative;
            min-height: 300px;
        }
        .left-side, .right-side {
            flex: 1;
        }
        .match-item {
            padding: 14px 18px;
            margin: 12px 0;
            background: #fffef8;
            border: 1px solid #d4c4a8;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: all 0.2s;
        }
        .match-item:hover {
            background: #f9f0e0;
        }
        .match-item.right {
            text-align: right;
        }
        .match-item.selected {
            background: #f4ede0;
            border-color: #8a6f52;
        }
        .match-item.connected {
            background: #e8f0d8;
            border-color: #5c7a4d;
        }
        .connection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- ヘッダー・コントロール部分は省略（前回と同じ） -->
    <div class="container">
        <header>
            <h1>MultiQuiz Viewer</h1>
            <div class="controls">
                <div class="upload-area" id="dropZone">...</div>
                <div class="url-load">...</div>
                <div class="id-load">...</div>
            </div>
        </header>

        <div id="quizContainer" class="hidden">
            <!-- ここも前回と同じ -->
            <div id="sections"></div>
            <div class="quiz-footer">
                <button id="submitAllBtn">全問回答を提出</button>
                <button id="resetBtn">リセット</button>
            </div>
        </div>

        <div id="errorMessage" class="hidden"></div>
    </div>

    <script src="scanner.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script>
        // ... ここまでの共通部分（loadLinkYaml, イベントリスナー, parseAndRender など）は前回と同じ ...

        function renderMatchingQuestion(q, container, globalQIdx) {
            const wrapper = document.createElement('div');
            wrapper.className = 'matching-container';
            wrapper.innerHTML = `
                <div class="left-side" id="left-${globalQIdx}"></div>
                <svg class="connection" id="svg-${globalQIdx}" width="100%" height="100%"></svg>
                <div class="right-side" id="right-${globalQIdx}"></div>
            `;

            const leftSide = wrapper.querySelector(`#left-${globalQIdx}`);
            const rightSide = wrapper.querySelector(`#right-${globalQIdx}`);
            const svg = wrapper.querySelector(`#svg-${globalQIdx}`);

            // 左側（問題）
            q.left.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'match-item';
                el.textContent = item;
                el.dataset.index = i;
                leftSide.appendChild(el);
            });

            // 右側（解答）
            q.right.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'match-item right';
                el.textContent = item;
                el.dataset.index = i;
                rightSide.appendChild(el);
            });

            let selectedLeft = null;

            // 左側クリック
            leftSide.addEventListener('click', e => {
                const item = e.target.closest('.match-item');
                if (!item) return;

                if (selectedLeft) selectedLeft.classList.remove('selected');
                selectedLeft = item;
                item.classList.add('selected');
            });

            // 右側クリック
            rightSide.addEventListener('click', e => {
                const rightItem = e.target.closest('.match-item');
                if (!rightItem || !selectedLeft) return;

                const leftIdx = parseInt(selectedLeft.dataset.index);
                const rightIdx = parseInt(rightItem.dataset.index);

                // すでに他の左と繋がっている右側は解除
                const currentConnections = userAnswers[globalQIdx] || [];
                for (let i = 0; i < currentConnections.length; i++) {
                    if (currentConnections[i] === rightIdx) {
                        currentConnections[i] = null;
                    }
                }

                // 新しい接続
                if (!userAnswers[globalQIdx]) userAnswers[globalQIdx] = new Array(q.left.length).fill(null);
                userAnswers[globalQIdx][leftIdx] = rightIdx;

                redrawAllConnections(svg, leftSide, rightSide, userAnswers[globalQIdx]);
                
                selectedLeft.classList.remove('selected');
                selectedLeft = null;

                // 見た目更新
                updateMatchItemStyles(leftSide, rightSide, userAnswers[globalQIdx]);
            });

            container.appendChild(wrapper);
        }

        function redrawAllConnections(svg, leftSide, rightSide, connections) {
            svg.innerHTML = '';
            if (!connections) return;

            connections.forEach((rightIdx, leftIdx) => {
                if (rightIdx === null) return;
                drawSingleConnection(svg, leftSide, rightSide, leftIdx, rightIdx);
            });
        }

        function drawSingleConnection(svg, leftSide, rightSide, leftIdx, rightIdx) {
            const leftItems = leftSide.children;
            const rightItems = rightSide.children;

            const leftRect = leftItems[leftIdx].getBoundingClientRect();
            const rightRect = rightItems[rightIdx].getBoundingClientRect();
            const svgRect = svg.getBoundingClientRect();

            const x1 = leftRect.right - svgRect.left + 2;
            const y1 = leftRect.top + leftRect.height / 2 - svgRect.top;
            const x2 = rightRect.left - svgRect.left - 2;
            const y2 = rightRect.top + rightRect.height / 2 - svgRect.top;

            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1);
            line.setAttribute("y1", y1);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);
            line.setAttribute("stroke", "#8a6f52");
            line.setAttribute("stroke-width", "3.5");
            line.setAttribute("stroke-linecap", "round");
            svg.appendChild(line);
        }

        function updateMatchItemStyles(leftSide, rightSide, connections) {
            Array.from(leftSide.children).forEach((el, i) => {
                el.classList.toggle('connected', connections[i] !== null);
            });
            Array.from(rightSide.children).forEach((el, i) => {
                const isUsed = connections.some(idx => idx === i);
                el.classList.toggle('connected', isUsed);
            });
        }

        // 他の機能（renderQuiz, renderFillQuestion など）は前回と同じ
    </script>
</body>
</html>
